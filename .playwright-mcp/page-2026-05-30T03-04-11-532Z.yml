        - button "Tiempos de entrega" [ref=e324] [cursor=pointer]:
          - generic [ref=e325]: Tiempos de entrega
          - img [ref=e327]
        - paragraph [ref=e329]: La entrega estándar suele tardar entre 7 y 10 días laborables. No ofrecemos garantías sobre tiempos de envío superiores al promedio y no aceptaremos reclamos por demoras fuera de nuestro control. El tiempo de envío se refiere al período comprendido entre la realización del pedido y la entrega al transportista. Si tu pedido no ha llegado después de dos semanas, contáctanos a aromadistribuido@gmail.com y analizaremos los detalles de tu caso.
      - generic [ref=e330]:
