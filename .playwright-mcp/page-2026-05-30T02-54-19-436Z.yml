          - img [ref=e298]
        - paragraph [ref=e300]: Todas las pasarelas de pago directo cumplen con los estándares establecidos por PCI-DSS, administrados por el PCI Security Standards Council. Este es un esfuerzo conjunto de marcas líderes como Visa, MasterCard, American Express y Discover, garantizando que tu información financiera esté siempre protegida.
