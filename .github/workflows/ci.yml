name: CI/CD — Aroma-Distribuido

on:
  push:
    branches: [main, develop, proyecto-aroma-distribuido]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/aroma-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/aroma-frontend
  WORKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/aroma-worker

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Backend tests & lint
  # ─────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aroma_test
          POSTGRES_USER: aroma_user
          POSTGRES_PASSWORD: aroma_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Verify imports (smoke test)
        working-directory: backend
        env:
          DATABASE_URL: postgresql://aroma_user:aroma_secret@localhost:5432/aroma_test
          SECRET_KEY: test-secret-key
          REDIS_URL: redis://localhost:6379/0
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          ENVIRONMENT: test
        run: python -c "from app.main import app; print('Backend imports OK')"

      - name: Health check endpoint (import)
        working-directory: backend
        env:
          DATABASE_URL: postgresql://aroma_user:aroma_secret@localhost:5432/aroma_test
          SECRET_KEY: test-secret-key
          REDIS_URL: redis://localhost:6379/0
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          ENVIRONMENT: test
        run: |
          python -c "
          from app.core.config import settings
          from app.core.redis_client import cache_get, cache_set
          from app.core.rabbitmq import publish_event
          print('Core modules OK')
          "

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Frontend build
  # ─────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vue 3 app
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000/api/v1
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Worker test
  # ─────────────────────────────────────────────────────────────────────────
  worker-test:
    name: Worker — Smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: worker/requirements.txt

      - name: Install worker dependencies
        working-directory: worker
        run: pip install -r requirements.txt

      - name: Verify worker imports
        working-directory: worker
        run: python -c "import aio_pika, json, asyncio; print('Worker imports OK')"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4: Build & Push Docker images (only on main push)
  # ─────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, worker-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ${{ env.WORKER_IMAGE }}:latest,${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 5: Deploy GitHub Pages — corre desde main O proyecto-aroma-distribuido
  # ─────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: GitHub Pages — Deploy docs
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/proyecto-aroma-distribuido')
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
