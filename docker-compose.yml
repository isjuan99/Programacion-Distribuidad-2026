version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
# Aroma-Distribuido — Sistema Distribuido
# ═══════════════════════════════════════════════════════════════════════════════
#
# Servicios:
#   frontend    → Vue 3 + Nginx           → http://localhost:80
#   backend     → FastAPI                  → http://localhost:8000
#   db          → PostgreSQL 15            → localhost:5432
#   redis       → Redis 7                  → localhost:6379
#   rabbitmq    → RabbitMQ 3 + Management → http://localhost:15672
#   worker      → Python consumer          → (background)
#   dozzle      → Log viewer               → http://localhost:8888
#   portainer   → Docker management        → http://localhost:9000
#
# Inicio rápido:
#   docker compose up -d
# ═══════════════════════════════════════════════════════════════════════════════

x-common-env: &common-env
  RABBITMQ_URL: amqp://aroma_user:aroma_secret@rabbitmq:5672/
  REDIS_URL: redis://redis:6379/0
  RABBITMQ_EXCHANGE: aroma_events
  SERVICE_NAME: aroma-backend
  ENVIRONMENT: production

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: aroma-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aroma_db
      POSTGRES_USER: aroma_user
      POSTGRES_PASSWORD: aroma_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aroma_user -d aroma_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aroma-net

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aroma-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aroma-net

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: aroma-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: aroma_user
      RABBITMQ_DEFAULT_PASS: aroma_secret
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aroma-net

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: aroma-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://aroma_user:aroma_secret@db:5432/aroma_db
      SECRET_KEY: cambiar-esto-en-produccion-usar-openssl-rand-hex-32
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      FRONTEND_URL: http://localhost:80
      UPLOAD_DIR: /app/uploads
      # SMTP — Gmail configurado
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: aromadistribuido@gmail.com
      SMTP_PASSWORD: qddxwmfplqpzzohj
      EMAILS_FROM: aromadistribuido@gmail.com
      EMAILS_FROM_NAME: Aroma-Distribuido
      # Google / Apple OAuth
      GOOGLE_CLIENT_ID: "563607884052-vuqvpo7ls4fqfoaidpubik653c1p6ner.apps.googleusercontent.com"
      APPLE_CLIENT_ID: ""
      # Stripe
      STRIPE_SECRET_KEY: sk_test_xxxxxxxxxxxxxxxxx
      STRIPE_WEBHOOK_SECRET: whsec_xxxxxxxxxxxxxxxxx
      # Cache TTLs
      CACHE_TTL_PRODUCTS: 300
      CACHE_TTL_CATEGORIES: 600
      CACHE_TTL_FEATURED: 120
      CACHE_TTL_SEARCH: 180
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - aroma-net

  # ── Worker (RabbitMQ Consumer) ────────────────────────────────────────────
  worker:
    build: ./worker
    container_name: aroma-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://aroma_user:aroma_secret@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_EXCHANGE: aroma_events
      SERVICE_NAME: aroma-worker
      ENVIRONMENT: production
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: aromadistribuido@gmail.com
      SMTP_PASSWORD: qddxwmfplqpzzohj
      EMAILS_FROM: aromadistribuido@gmail.com
    networks:
      - aroma-net

  # ── Vue 3 Frontend ────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: aroma-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - aroma-net

  # ── Dozzle — Log Viewer ───────────────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: aroma-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8888:8080"
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_FILTER: "name=aroma-*"
    networks:
      - aroma-net

  # ── Portainer — Docker Management ─────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: aroma-portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9000:9000"
      - "9443:9443"
    networks:
      - aroma-net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  uploads_data:
  portainer_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  aroma-net:
    driver: bridge
    name: aroma-network
